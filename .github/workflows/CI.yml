name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # This package develops the unregistered CompetingClocks 0.4 via a
        # [sources] git-URL entry, which Julia only honors on 1.11+. On 1.10
        # (lts) [sources] is ignored and resolution falls back to the registered
        # CompetingClocks 0.1-0.3, failing the 0.4 compat bound, so lts is out.
        # The suite's seeded statistical tests are calibrated to a released
        # RNG stream and drift on prerelease Julia, so 'pre' is out too; we
        # pin the two current released versions that support [sources].
        version:
          - '1.11'
          - '1.12'
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      # CompetingClocks (and, for the extension tests, ChronoSim) resolve from
      # the [sources] git-URL entries in Project.toml and test/Project.toml, so
      # a plain checkout builds without any sibling layout or manifest surgery.
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
